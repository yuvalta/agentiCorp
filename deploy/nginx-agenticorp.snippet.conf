# AgentiCorp — nginx location snippet.
#
# IMPORTANT: the VPS already has ONE server block that owns
# `server_name 72.62.52.253` (the worldcup app; faceless is mounted inside it).
# A second server block with the same server_name conflicts, so DO NOT add a new
# `server { ... }`. Instead INJECT these two location blocks into that existing
# server block (back it up first). See DEPLOY.md.
#
# The app is subpath-aware (BASE_PATH=/agenticorp): nginx forwards the full URI
# and proxy_pass WITHOUT a trailing path preserves it. Basic-auth gates the CEO
# controls (gate/idea approval) since this is on a public IP over plain HTTP.

location = /agenticorp { return 301 /agenticorp/; }

location /agenticorp/ {
    auth_basic "AgentiCorp";
    auth_basic_user_file /etc/nginx/.htpasswd-agenticorp;

    proxy_pass http://127.0.0.1:8012;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
